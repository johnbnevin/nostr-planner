<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/calendar.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#4c6ef5" />
    <title>Planner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator && !("__TAURI_INTERNALS__" in window)) {
        // Derive SW path from document location so the app works at any
        // deployment subpath (e.g. "/", "/planner/", or an nsite URL).
        var swBase = location.pathname.replace(/[^/]*$/, "");
        navigator.serviceWorker.register(swBase + "sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
