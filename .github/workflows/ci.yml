name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-test-build:
    name: Typecheck, Test & Build (Web)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (planner app)
        working-directory: apps/planner
        run: npm run typecheck

      - name: Typecheck (daemon)
        working-directory: apps/daemon
        run: npm run typecheck

      - name: Run tests (planner)
        working-directory: apps/planner
        run: npm run test

      - name: Run tests (daemon)
        working-directory: apps/daemon
        run: npm run test

      - name: Build web app
        working-directory: apps/planner
        run: npm run build:web

  build-desktop:
    name: Desktop (${{ matrix.target }})
    needs: typecheck-test-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/planner/src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri desktop app
        working-directory: apps/planner
        run: npx tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: apps/planner/src-tauri/target/release/bundle/**
          retention-days: 30

  build-android:
    name: Android
    needs: typecheck-test-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/planner/src-tauri

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        working-directory: apps/planner
        run: npx tauri android build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/planner/src-tauri/gen/android/app/build/outputs/**
          retention-days: 30

  build-ios:
    name: iOS
    needs: typecheck-test-build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust iOS targets
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/planner/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Initialize iOS project
        working-directory: apps/planner
        run: npx tauri ios init

      - name: Build iOS app
        working-directory: apps/planner
        run: npx tauri ios build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: apps/planner/src-tauri/gen/ios/build/**
          retention-days: 30
